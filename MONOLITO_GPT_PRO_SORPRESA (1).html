<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO — Vista Premium</title>

<style>
:root{
 --header:#B79C8C;
 --header-dark:#A68C7D;
 --bg:#E7E3DC;
 --card:#C9C1B3;
 --card-hover:#BFB5A6;
 --text:#1C1C1C;
 --incident:#8B1E1E;
 --comm:#D4A017;
}

body{
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
 background:var(--bg);
 color:var(--text);
}

.header{
 background:linear-gradient(135deg,var(--header),var(--header-dark));
 padding:32px 26px;
 color:white;
 box-shadow:0 6px 18px rgba(0,0,0,0.18);
}

.title{
 font-size:30px;
 font-weight:700;
 letter-spacing:0.5px;
}

.subtitle{
 margin-top:6px;
 font-size:15px;
 opacity:0.95;
}

.container{
 padding:28px;
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:18px;
}

.card{
 background:var(--card);
 border-radius:16px;
 padding:26px 18px;
 text-align:center;
 font-size:19px;
 font-weight:600;
 box-shadow:0 6px 14px rgba(0,0,0,0.14);
 transition:all 0.15s ease;
 user-select:none;
}

.card:hover{
 background:var(--card-hover);
 transform:translateY(-2px);
 box-shadow:0 8px 18px rgba(0,0,0,0.18);
}

.card:active{
 transform:scale(0.97);
}

.fab{
 position:fixed;
 bottom:26px;
 width:72px;
 height:72px;
 border-radius:50%;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:30px;
 color:white;
 box-shadow:0 10px 24px rgba(0,0,0,0.35);
}

.fab.incident{
 right:26px;
 background:var(--incident);
}

.fab.comm{
 left:26px;
 background:var(--comm);
}

.footer{
 text-align:center;
 padding:14px;
 font-size:12px;
 opacity:0.5;
}

</style>
</head>

<body>

<div class="header">
<div class="title">MONOLITO GPT PRO</div>
<div class="subtitle">Sistema de control profesional · Cafetería El Monolito</div>
</div>

<div class="container">

<div class="card">Ventas diarias</div>
<div class="card">Diario del bar</div>

<div class="card">Proveedores y pedidos</div>
<div class="card">Documentos</div>

<div class="card">Comparador de precios</div>
<div class="card">Artículos</div>

</div>

<div class="fab comm">✉</div>
<div class="fab incident">!</div>

<div class="footer">Diseño MONOLITO GPT PRO · Paleta oficial</div>

</body>
</html>
