<select id="proveedor" onchange="mostrarArticulos()">
<option value="">Seleccionar proveedor</option>
<option value="estrella">Estrella Galicia</option>
<option value="cocacola">Coca Cola</option>
<option value="cafe">Cafés Candelas</option>
</select>

<br><br>

<div id="articulos"></div>

<script>

function mostrarArticulos(){

let proveedor = document.getElementById("proveedor").value;
let html = "";

if(proveedor === "estrella"){

html = `
<table>
<tr><th>Artículo</th><th>Cantidad</th></tr>
<tr><td>⭐ Barril Estrella</td><td><input type="number" value="0"></td></tr>
<tr><td>⭐ Botellín caja</td><td><input type="number" value="0"></td></tr>
</table>
`;

}

if(proveedor === "cocacola"){

html = `
<table>
<tr><th>Artículo</th><th>Cantidad</th></tr>
<tr><td>⭐ Coca Cola caja</td><td><input type="number" value="0"></td></tr>
<tr><td>⭐ Fanta naranja</td><td><input type="number" value="0"></td></tr>
<tr><td>⭐ Aquarius</td><td><input type="number" value="0"></td></tr>
</table>
`;

}

if(proveedor === "cafe"){

html = `
<table>
<tr><th>Artículo</th><th>Cantidad</th></tr>
<tr><td>⭐ Café mezcla</td><td><input type="number" value="0"></td></tr>
<tr><td>⭐ Café descafeinado</td><td><input type="number" value="0"></td></tr>
</table>
`;

}

document.getElementById("articulos").innerHTML = html;

}

</script>
