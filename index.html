<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>MONOLITO – Sistema del Bar</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
text-align:center;
}

.header{
background:#222;
color:white;
padding:14px;
font-weight:bold;
display:flex;
justify-content:center;
align-items:center;
}

.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
padding:20px;
max-width:900px;
margin:auto;
}

.boton{
border-radius:12px;
color:white;
font-weight:bold;
padding:30px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:18px;
transition:0.15s;
text-decoration:none;
}

.boton:active{
transform:scale(0.95);
filter:brightness(0.9);
}

.azul{background:#3c7ec4;}
.gris{background:#5d666d;}
.naranja{background:#e8892b;}
.verde{background:#5cab4b;}

.footer{
margin-top:25px;
color:#777;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
MONOLITO – Sistema del Bar
</div>

<div class="container">

<a href="proveedores.html" class="boton azul">
📦
Proveedores
</a>

<div class="boton gris">
🍺
Artículos
</div>

<div class="boton naranja">
📝
Pedidos
</div>

<div class="boton verde">
💳
Pagos proveedores
</div>

<div class="boton azul">
⚠
Incidencias
</div>

<div class="boton gris">
📊
Comparador precios
</div>

<div class="boton naranja">
📅
Calendario
</div>

<div class="boton verde">
🔔
Avisos
</div>

<div class="boton gris">
⚙
Configuración
</div>

</div>

<div class="footer">
Monolito GPT Pro
</div>

</body>
</html>
