<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>MONOLITO – Sistema del Bar</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="icon" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
background:#111;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

.btnTop{
background:#444;
color:white;
padding:10px 14px;
border-radius:10px;
text-decoration:none;
}

.grid{
padding:18px;
display:grid;
grid-template-columns:1fr;
gap:18px;
}

@media (min-width:900px){
.grid{
grid-template-columns:1fr 1fr 1fr;
}
}

.boton{
height:140px;
border-radius:24px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
color:white;
box-shadow:0 12px 0 rgba(0,0,0,0.25);
transition:0.1s;
text-decoration:none;
}

.boton:active{
transform:translateY(6px);
box-shadow:0 6px 0 rgba(0,0,0,0.25);
}

.icono{
font-size:52px;
margin-bottom:6px;
}

.azul{background:#4a86c5;}
.gris{background:#6b6f73;}
.verde{background:#5cab4b;}
.naranja{background:#e38b2c;}

</style>
</head>

<body>

<div class="header">
<a class="btnTop" href="#">← Volver</a>
<div>MONOLITO</div>
<a class="btnTop" href="#">Ayuda</a>
</div>

<div class="grid">

<a class="boton azul" href="proveedores.html" onclick="vibra()">
<div class="icono">📦</div>
PROVEEDORES
</a>

<a class="boton gris" href="articulos.html" onclick="vibra()">
<div class="icono">🍺</div>
ARTÍCULOS
</a>

<a class="boton naranja" href="pedidos.html" onclick="vibra()">
<div class="icono">📝</div>
PEDIDOS
</a>

<a class="boton verde" href="pagos.html" onclick="vibra()">
<div class="icono">💳</div>
PAGOS
</a>

<a class="boton gris" href="incidencias.html" onclick="vibra()">
<div class="icono">⚠️</div>
INCIDENCIAS
</a>

<a class="boton azul" href="comparador.html" onclick="vibra()">
<div class="icono">📊</div>
COMPARADOR
</a>

<a class="boton naranja" href="calendario.html" onclick="vibra()">
<div class="icono">📅</div>
CALENDARIO
</a>

<a class="boton verde" href="mensajes.html" onclick="vibra()">
<div class="icono">✉️</div>
MENSAJES
</a>

<a class="boton gris" href="configuracion.html" onclick="vibra()">
<div class="icono">⚙️</div>
CONFIGURACIÓN
</a>

</div>

<script>
function vibra(){
if(navigator.vibrate){
navigator.vibrate(60);
}
}
</script>

</body>
</html>
