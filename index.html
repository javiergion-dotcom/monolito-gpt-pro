<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#e6e6e6;
}

.topbar{
background:#1f2c34;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
}

.iconos{
display:flex;
gap:18px;
font-size:20px;
}

.grid{
padding:16px;
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.btn{
height:120px;
border-radius:18px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
font-weight:600;
font-size:18px;
box-shadow:0 6px 14px rgba(0,0,0,0.25);
position:relative;
}

.azul{background:linear-gradient(#5d8db8,#3e6f99);}
.gris{background:linear-gradient(#7c8b92,#5f6d73);}
.verde{background:linear-gradient(#6aa84f,#4e7d36);}
.naranja{background:linear-gradient(#f6a623,#d98200);}
.oscuro{background:linear-gradient(#546e7a,#37474f);}

.icono{
font-size:34px;
margin-bottom:8px;
}

.badge{
position:absolute;
top:10px;
right:12px;
background:white;
color:#d98200;
width:28px;
height:28px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}

</style>
</head>

<body>

<div class="topbar">
<div>MONOLITO</div>
<div class="iconos">
⚠️ 🔎 ❓ ↩️
</div>
</div>

<div class="grid">

<div class="btn azul">
<div class="icono">🚚</div>
PROVEEDORES
</div>

<div class="btn gris">
<div class="icono">📋</div>
ARTÍCULOS
</div>

<div class="btn gris">
<div class="icono">📊</div>
COMPARADOR
</div>

<div class="btn azul">
<div class="icono">📝</div>
PEDIDOS
</div>

<div class="btn naranja">
<div class="icono">🔎</div>
REVISIÓN
</div>

<div class="btn gris">
<div class="icono">⚙️</div>
CONFIGURACIÓN
</div>

<div class="btn verde">
<div class="icono">📂</div>
HISTÓRICO
</div>

<div class="btn gris">
<div class="icono">💰</div>
VENTAS
</div>

<div class="btn gris">
<div class="icono">📅</div>
CALENDARIO
</div>

<div class="btn naranja">
<div class="badge">3</div>
<div class="icono">✉️</div>
COMUNICACIÓN
</div>

<div class="btn oscuro">
<div class="icono">💳</div>
PAGOS
</div>

</div>

</body>
</html>
