<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monolito GPT Pro</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
text-align:center;
}

.header{
background:#222;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.header span{
cursor:pointer;
}

.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
padding:20px;
max-width:1000px;
margin:auto;
}

.boton{
border-radius:14px;
color:white;
font-weight:bold;
padding:28px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:0.15s;
font-size:18px;
}

.boton:active{
transform:scale(0.95);
filter:brightness(0.9);
}

.azul{background:#3c7ec4;}
.gris{background:#5d666d;}
.naranja{background:#e8892b;}
.verde{background:#5cab4b;}

.footer{
margin-top:20px;
color:#777;
font-size:14px;
}

.indicadores{
margin:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<span>⬅ Volver</span>
<div>MONOLITO GPT PRO</div>
<div id="hora"></div>
<span>❓ Ayuda</span>
</div>

<div class="indicadores">
🔴 Incidencias (0) &nbsp;&nbsp; 🟡 Comunicaciones (0)
</div>

<div class="container">

<div class="boton azul">PROVEEDORES</div>

<div class="boton gris">ARTÍCULOS</div>

<div class="boton gris">COMPARADOR</div>

<div class="boton azul">PEDIDOS</div>

<div class="boton naranja">A TENER EN CUENTA</div>

<div class="boton gris">CONFIGURACIÓN</div>

<div class="boton verde">HISTÓRICO</div>

<div class="boton azul">VENTAS</div>

<div class="boton azul">PAGOS PROVEEDORES</div>

<div class="boton gris">CALENDARIO</div>

<div class="boton gris">COMPROBACIONES</div>

</div>

<div class="footer">
Monolito GPT Pro<br>
por Javier Gion – IA ChatGPT
</div>

<script>

function actualizarHora(){
const ahora=new Date();
let h=ahora.getHours().toString().padStart(2,"0");
let m=ahora.getMinutes().toString().padStart(2,"0");
document.getElementById("hora").innerHTML=h+":"+m;
}

setInterval(actualizarHora,1000);
actualizarHora();

</script>

</body>
</html>
