<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MONOLITO – Sistema del Bar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#e9ecef;
}

.topbar{
background:#111;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
letter-spacing:1px;
box-shadow:0 3px 10px rgba(0,0,0,0.4);
}

.panel{
max-width:1000px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.boton{
background:linear-gradient(#5f6b75,#3f4850);
border-radius:14px;
height:120px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.25);
transition:0.15s;
text-decoration:none;
}

.boton span{
font-size:44px;
margin-bottom:8px;
}

.boton:active{
transform:scale(0.95);
box-shadow:0 3px 8px rgba(0,0,0,0.5);
}

.azul{background:linear-gradient(#5d9be0,#3c7ec4);}
.verde{background:linear-gradient(#73c15c,#4ea63c);}
.naranja{background:linear-gradient(#f3a14a,#e8892b);}
.gris{background:linear-gradient(#7b858d,#5d666d);}

.footer{
text-align:center;
margin-top:20px;
color:#666;
font-size:14px;
}

</style>

<script>
function vibrar(){
if(navigator.vibrate){
navigator.vibrate(60);
}
}

function ir(url){
vibrar();
setTimeout(()=>{
window.location=url;
},120);
}
</script>

</head>

<body>

<div class="topbar">
MONOLITO – Sistema del Bar
</div>

<div class="panel">

<div class="boton azul" onclick="ir('proveedores.html')">
<span>🚚</span>
PROVEEDORES
</div>

<div class="boton gris" onclick="ir('articulos.html')">
<span>🍺</span>
ARTÍCULOS
</div>

<div class="boton naranja" onclick="ir('pedidos.html')">
<span>📝</span>
PEDIDOS
</div>

<div class="boton verde" onclick="ir('pagos.html')">
<span>💳</span>
PAGOS
</div>

<div class="boton azul" onclick="ir('incidencias.html')">
<span>⚠️</span>
INCIDENCIAS
</div>

<div class="boton gris" onclick="ir('comparador.html')">
<span>📊</span>
COMPARADOR
</div>

<div class="boton naranja" onclick="ir('calendario.html')">
<span>📅</span>
CALENDARIO
</div>

<div class="boton verde" onclick="ir('avisos.html')">
<span>🔔</span>
AVISOS
</div>

<div class="boton gris" onclick="ir('configuracion.html')">
<span>⚙️</span>
CONFIGURACIÓN
</div>

</div>

<div class="footer">
Monolito GPT Pro – Control real del bar
</div>

</body>
</html>
