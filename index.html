<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MONOLITO</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#e9ecef;
}

.header{
background:#111;
color:white;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:18px;
padding:18px;
}

.boton{
background:linear-gradient(#4a90e2,#2f6fb5);
border-radius:18px;
color:white;
font-size:18px;
font-weight:bold;
text-align:center;
padding:28px 10px;
box-shadow:0 6px 0 #1d4e82;
transition:0.1s;
}

.boton:active{
transform:translateY(4px);
box-shadow:0 2px 0 #1d4e82;
}

.icono{
font-size:34px;
display:block;
margin-bottom:8px;
}

</style>
</head>

<body>

<div class="header">
MONOLITO GPT PRO
</div>

<div class="grid">

<div class="boton"><span class="icono">📦</span>PROVEEDORES</div>
<div class="boton"><span class="icono">🍺</span>ARTÍCULOS</div>
<div class="boton"><span class="icono">📝</span>PEDIDOS</div>

<div class="boton"><span class="icono">💳</span>PAGOS</div>
<div class="boton"><span class="icono">⚠</span>INCIDENCIAS</div>
<div class="boton"><span class="icono">📊</span>COMPARADOR</div>

<div class="boton"><span class="icono">📅</span>CALENDARIO</div>
<div class="boton"><span class="icono">🔔</span>AVISOS</div>
<div class="boton"><span class="icono">⚙</span>CONFIG</div>

</div>

<script>
if ("vibrate" in navigator) {
document.querySelectorAll(".boton").forEach(b=>{
b.addEventListener("click",()=>navigator.vibrate(40))
})
}
</script>

</body>
</html>
