<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monolito – Sistema del Bar</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
text-align:center;
}

.header{
background:#222;
color:white;
padding:14px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.header span{
cursor:pointer;
}

.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
padding:20px;
max-width:1000px;
margin:auto;
}

.boton{
border-radius:12px;
color:white;
font-weight:bold;
padding:28px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:0.15s;
}

.boton:active{
transform:scale(0.95);
filter:brightness(0.9);
}

.azul{background:#3c7ec4;}
.gris{background:#5d666d;}
.naranja{background:#e8892b;}
.verde{background:#5cab4b;}

.footer{
margin-top:20px;
color:#777;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<span>⬅ Volver</span>
<div>MONOLITO – Sistema del Bar</div>
<span>❓ Ayuda</span>
</div>
