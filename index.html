<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MONOLITO – Sistema del Bar</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f2f2f2;
margin:0;
}

/* BARRA SUPERIOR */

.header{
background:#111;
color:white;
padding:16px;
font-size:22px;
font-weight:bold;
text-align:center;
position:sticky;
top:0;
}

/* CONTENEDOR */

.container{
display:grid;
grid-template-columns:1fr;
gap:22px;
padding:18px;
max-width:1100px;
margin:auto;
}

/* móvil horizontal */
@media (min-width:600px){
.container{
grid-template-columns:repeat(2,1fr);
}
}

/* tablet */
@media (min-width:900px){
.container{
grid-template-columns:repeat(3,1fr);
}
}

/* BOTONES */

.boton{
height:150px;
border-radius:26px;
color:white;
font-weight:bold;
font-size:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-decoration:none;
box-shadow:0 10px 20px rgba(0,0,0,0.25);
transition:0.15s;
}

.boton:active{
transform:scale(0.95);
}

/* COLORES */

.azul{background:#3c7ec4;}
.gris{background:#5f676e;}
.verde{background:#5cab4b;}
.naranja{background:#e8892b;}

/* ICONOS */

.icono{
font-size:48px;
margin-bottom:10px;
}

/* PIE */

.footer{
text-align:center;
color:#777;
margin:30px;
}

</style>
</head>

<body>

<div class="header">
MONOLITO
</div>

<div class="container">

<a href="proveedores.html" class="boton azul">
<div class="icono">📦</div>
PROVEEDORES
</a>

<a href="articulos.html" class="boton gris">
<div class="icono">🍺</div>
ARTÍCULOS
</a>

<a href="pedidos.html" class="boton naranja">
<div class="icono">📝</div>
PEDIDOS
</a>

<a href="pagos.html" class="boton verde">
<div class="icono">💳</div>
PAGOS
</a>

<a href="incidencias.html" class="boton gris">
<div class="icono">⚠️</div>
INCIDENCIAS
</a>

<a href="comparador.html" class="boton azul">
<div class="icono">📊</div>
COMPARADOR
</a>

<a href="calendario.html" class="boton naranja">
<div class="icono">📅</div>
CALENDARIO
</a>

<a href="avisos.html" class="boton gris">
<div class="icono">✉️</div>
MENSAJES
</a>

<a href="configuracion.html" class="boton gris">
<div class="icono">⚙️</div>
CONFIGURACIÓN
</a>

</div>

<div class="footer">
Monolito GPT Pro – Control real del bar
</div>

</body>
</html>
