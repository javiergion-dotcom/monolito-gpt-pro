
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Monolito</title>

<!-- MODO APP -->
<meta name="theme-color" content="#1f2c34">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#e6e6e6;
}

header{
background:#1f2c34;
color:white;
padding:12px;
display:flex;
align-items:center;
justify-content:space-between;
font-size:18px;
}

.header-icons span{
margin-left:18px;
font-size:20px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:16px;
padding:18px;
}

.btn{
background:#6e7b83;
color:white;
border-radius:16px;
height:110px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-weight:600;
font-size:15px;
box-shadow:0 6px 14px rgba(0,0,0,0.25);
position:relative;
}

.blue{background:#5b86b3;}
.green{background:#6aa84f;}
.orange{background:#f39c12;}
.dark{background:#455a64;}

.icon{
font-size:34px;
margin-bottom:6px;
}

.badge{
position:absolute;
top:8px;
right:10px;
background:white;
color:#f39c12;
width:26px;
height:26px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<div><b>MONOLITO</b></div>

<div class="header-icons">
<span>⚠️</span>
<span>🔍</span>
<span>❓</span>
<span>↩</span>
</div>

</header>

<div class="grid">

<div class="btn blue"><div class="icon">🚚</div>PROVEEDORES</div>
<div class="btn"><div class="icon">📋</div>ARTÍCULOS</div>
<div class="btn"><div class="icon">📊</div>COMPARADOR</div>

<div class="btn blue"><div class="icon">📝</div>PEDIDOS</div>
<div class="btn orange"><div class="icon">🔎</div>REVISIÓN</div>
<div class="btn"><div class="icon">⚙️</div>CONFIGURACIÓN</div>

<div class="btn green"><div class="icon">📂</div>HISTÓRICO</div>
<div class="btn"><div class="icon">💰</div>VENTAS</div>
<div class="btn"><div class="icon">📅</div>CALENDARIO</div>

<div class="btn orange">
<div class="badge">3</div>
<div class="icon">✉️</div>
COMUNICACIÓN
</div>

<div class="btn dark"><div class="icon">💳</div>PAGOS</div>

</div>

</body>
</html>
