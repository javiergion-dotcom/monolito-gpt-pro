<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#e6e6e6;
}

.header{
background:#111;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

/* BOTONES SUPERIORES */

.top-btn{
background:#444;
color:white;
padding:8px 14px;
border-radius:8px;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);   /* 🔥 FORZADO 3 COLUMNAS */
gap:18px;
padding:18px;
}

.boton{
border-radius:22px;
color:white;
font-size:20px;
font-weight:bold;
text-align:center;
padding:35px 10px;
box-shadow:0 8px 0 rgba(0,0,0,0.35);
transition:0.12s;
}

.boton:active{
transform:translateY(6px);
box-shadow:0 2px 0 rgba(0,0,0,0.35);
}

.icono{
font-size:60px;
display:block;
margin-bottom:10px;
}

.azul{background:linear-gradient(#4a90e2,#2f6fb5);}
.gris{background:linear-gradient(#7a7a7a,#505050);}
.verde{background:linear-gradient(#69b34c,#3e8e2f);}
.naranja{background:linear-gradient(#f29c1f,#d97800);}

</style>
</head>

<body>

<div class="header">
<div class="top-btn">← Volver</div>
<div>MONOLITO</div>
<div class="top-btn">Ayuda</div>
</div>

<div class="grid">

<div class="boton azul"><span class="icono">📦</span>PROVEEDORES</div>
<div class="boton gris"><span class="icono">🍺</span>ARTÍCULOS</div>
<div class="boton naranja"><span class="icono">📝</span>PEDIDOS</div>

<div class="boton verde"><span class="icono">💳</span>PAGOS</div>
<div class="boton azul"><span class="icono">⚠️</span>INCIDENCIAS</div>
<div class="boton gris"><span class="icono">📊</span>COMPARADOR</div>

<div class="boton naranja"><span class="icono">📅</span>CALENDARIO</div>
<div class="boton verde"><span class="icono">✉️</span>MENSAJES</div>
<div class="boton azul"><span class="icono">⚙️</span>CONFIG</div>

</div>

<script>
if ("vibrate" in navigator) {
document.querySelectorAll(".boton").forEach(b=>{
b.addEventListener("click",()=>navigator.vibrate(40))
})
}
</script>

</body>
</html>
