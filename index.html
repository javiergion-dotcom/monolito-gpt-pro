<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MONOLITO</title>

<style>

body{
font-family:Arial;
background:#e5e5e5;
margin:0;
text-align:center;
}

header{
background:#222;
color:white;
padding:20px;
font-size:28px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:30px;
max-width:900px;
margin:auto;
}

.boton{
padding:30px;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.proveedores{background:#2e6da4;}
.articulos{background:#555;}
.comparador{background:#666;}

.pedidos{background:#3a7bd5;}
.alerta{background:#f39c12;}
.config{background:#777;}

.historico{background:#4caf50;}
.caja{background:#444;}
.diario{background:#555;}

.pagos{background:#444;}

.boton:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<header>MONOLITO</header>

<div class="grid">

<div class="boton proveedores" onclick="location.href='proveedores.html'">
PROVEEDORES
</div>

<div class="boton articulos" onclick="location.href='articulos.html'">
ARTÍCULOS
</div>

<div class="boton comparador">
COMPARADOR
</div>

<div class="boton pedidos">
PEDIDOS
</div>

<div class="boton alerta">
A TENER EN CUENTA
</div>

<div class="boton config">
CONFIGURACIÓN
</div>

<div class="boton historico">
HISTÓRICO
</div>

<div class="boton caja">
CAJA
</div>

<div class="boton diario">
DIARIO
</div>

<div class="boton pagos">
PAGOS
</div>

</div>

</body>
</html>
