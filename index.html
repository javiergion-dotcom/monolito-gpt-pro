<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MONOLITO – Sistema del Bar</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f2f2f2;
margin:0;
}

/* BARRA */

.header{
background:#111;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
font-size:20px;
}

.topbtn{
background:#444;
padding:8px 14px;
border-radius:10px;
color:white;
text-decoration:none;
}

/* GRID */

.container{
display:grid;
grid-template-columns:1fr;
gap:22px;
padding:20px;
max-width:1200px;
margin:auto;
}

/* tablet */
@media (min-width:900px){
.container{
grid-template-columns:repeat(3,1fr);
}
}

/* BOTONES */

.boton{
height:160px;
border-radius:30px;
color:white;
font-weight:bold;
font-size:22px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-decoration:none;
box-shadow:
0 14px 0 rgba(0,0,0,0.25),
0 18px 30px rgba(0,0,0,0.25);
transition:0.1s;
}

/* efecto hundir */

.boton:active{
transform:translateY(10px);
box-shadow:
0 4px 0 rgba(0,0,0,0.25),
0 6px 10px rgba(0,0,0,0.25);
}

/* colores */

.azul{background:#3c7ec4;}
.gris{background:#5f676e;}
.verde{background:#5cab4b;}
.naranja{background:#e8892b;}

/* iconos */

.icono{
font-size:54px;
margin-bottom:10px;
}

/* pie */

.footer{
text-align:center;
color:#777;
margin:25px;
}

</style>

<script>

/* vibración */

function vibrar(){
if(navigator.vibrate){
navigator.vibrate(40);
}
}

</script>

</head>

<body>

<div class="header">
<a href="#" class="topbtn">← Volver</a>
<div>MONOLITO</div>
<a href="#" class="topbtn">Ayuda</a>
</div>

<div class="container">

<a onclick="vibrar()" href="proveedores.html" class="boton azul">
<div class="icono">📦</div>
PROVEEDORES
</a>

<a onclick="vibrar()" href="articulos.html" class="boton gris">
<div class="icono">🍺</div>
ARTÍCULOS
</a>

<a onclick="vibrar()" href="pedidos.html" class="boton naranja">
<div class="icono">📝</div>
PEDIDOS
</a>

<a onclick="vibrar()" href="pagos.html" class="boton verde">
<div class="icono">💳</div>
PAGOS
</a>

<a onclick="vibrar()" href="incidencias.html" class="boton gris">
<div class="icono">⚠️</div>
INCIDENCIAS
</a>

<a onclick="vibrar()" href="comparador.html" class="boton azul">
<div class="icono">📊</div>
COMPARADOR
</a>

<a onclick="vibrar()" href="calendario.html" class="boton naranja">
<div class="icono">📅</div>
CALENDARIO
</a>

<a onclick="vibrar()" href="avisos.html" class="boton gris">
<div class="icono">✉️</div>
MENSAJES
</a>

<a onclick="vibrar()" href="configuracion.html" class="boton gris">
<div class="icono">⚙️</div>
CONFIGURACIÓN
</a>

</div>

<div class="footer">
Monolito GPT Pro – Control real del bar
</div>

</body>
</html>
