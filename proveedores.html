<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proveedores</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
text-align:center;
}

.header{
background:#222;
color:white;
padding:15px;
font-size:20px;
}

.container{
padding:25px;
}

input{
padding:10px;
margin:10px;
width:250px;
}

button{
padding:10px 20px;
background:#3c7ec4;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.lista{
margin-top:20px;
}

.item{
background:white;
padding:10px;
margin:5px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">
PROVEEDORES
</div>

<div class="container">

<input id="proveedor" placeholder="Nombre del proveedor">

<br>

<button onclick="agregarProveedor()">Añadir proveedor</button>

<div class="lista" id="listaProveedores"></div>

<br>

<a href="index.html">
<button>Volver al menú</button>
</a>

</div>

<script>

function agregarProveedor(){

let nombre = document.getElementById("proveedor").value

if(nombre==="") return

let lista = document.getElementById("listaProveedores")

let item = document.createElement("div")
item.className="item"
item.innerText = nombre

lista.appendChild(item)

document.getElementById("proveedor").value=""

}

</script>

</body>
</html>
